<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mainframe UI Sample</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Mainframe UI Sample</h1>

      <div class="card mb-3">
        <div class="card-body">
          <form id="echoForm">
            <div class="mb-3">
              <label for="inputText" class="form-label">Message</label>
              <input type="text" class="form-control" id="inputText" placeholder="Type something..." />
            </div>
            <button class="btn btn-primary" type="submit">Send</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h5>Response</h5>
          <pre id="response" class="small"></pre>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById('echoForm');
      const resp = document.getElementById('response');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = document.getElementById('inputText').value;
        const res = await fetch('/api/echo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        resp.textContent = JSON.stringify(data, null, 2);
      });
    </script>
  </body>
</html>
